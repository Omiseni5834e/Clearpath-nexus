services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: VaultLockPass2026!
      POSTGRES_DB: clearpath_nexus_db
    ports:
      - "5432:5432"
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_admin -d clearpath_nexus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql+asyncpg://nexus_admin:VaultLockPass2026!@postgres:5432/clearpath_nexus_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  nexus_pg_data:
