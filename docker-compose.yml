services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clearpath_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clearpath_password}
      POSTGRES_DB: ${POSTGRES_DB:-clearpath_nexus_db}
    ports:
      - "5432:5432"
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_USER: ${POSTGRES_USER:-clearpath_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clearpath_password}
      POSTGRES_DB: ${POSTGRES_DB:-clearpath_nexus_db}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clearpath_user}:${POSTGRES_PASSWORD:-clearpath_password}@postgres:5432/${POSTGRES_DB:-clearpath_nexus_db}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_BACKEND_PROXY_TARGET: http://backend:8000
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    depends_on:
      backend:
        condition: service_started

volumes:
  nexus_pg_data:
